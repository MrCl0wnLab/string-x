[flake8]
max-line-length = 100
exclude = .git,__pycache__,build,dist
ignore = E203,W503

[isort]
profile = black
multi_line_output = 3

[mypy]
python_version = 3.12
disallow_untyped_defs = True
disallow_incomplete_defs = True

[tool:black]
line-length = 100
target-version = ['py310', 'py311', 'py312']
include = '\.pyi?$'